<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Quiz do Arthurzão</title>
</head>
<body>
    

    <div class="quiz-container">

        <div id="start-screen">
            <h1>Quiz Arthur Morgan</h1>
            <button id="startBtn">Iniciar Quiz</button>
        </div>

        <div id="quiz" class="hidden">
            <p id="progress"></p>
            <h2 id="question"></h2>
            <div id="answers"></div>
        </div>

       
        <div id="result" class="hidden">
            <h2>Quiz Finalizado!</h2>
            <p id="score"></p>
            <p id="message"></p>
            <button id="restartBtn">Jogar Novamente</button>
        </div>

    </div>

    <script src="javasD.js"></script>
</body>
</html>
